# Local-friendly Isolation Forest profile for faster training during validation
# Run with: mvn -pl ai-sentinel-demo spring-boot:run -Dspring-boot.run.profiles=stage2
ai:
  sentinel:
    enabled: true
    mode: MONITOR
    isolation-forest:
      enabled: true
      min-training-samples: 50
      retrain-interval: 15s
      sample-rate: 1.0
      training-buffer-size: 500
    # Log every score for normal vs attack comparison during validation
    telemetry:
      log-verbosity: FULL
      log-score-threshold: 0
